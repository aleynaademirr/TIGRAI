{% extends "admin/base.html" %}
{% block title %}{% if action == 'create' %}Yeni İçerik{% else %}İçerik Düzenle{% endif %} - TIGRAI Admin{% endblock %}
{% block content %}
<h2 style="margin-bottom: 2rem; color: #4CAF50;">
    {% if action == 'create' %}➕ Yeni İçerik Ekle{% else %}✏️ İçerik Düzenle{% endif %}
</h2>
<div class="card">
    <form method="post">
        <div class="form-group">
            <label for="baslik">Başlık *</label>
            <input type="text" id="baslik" name="baslik" value="{{ icerik.baslik if icerik else '' }}" required>
        </div>
        <div class="form-group">
            <label for="tur">Tür *</label>
            <select id="tur" name="tur" required>
                <option value="Film" {% if icerik and icerik.tur=='Film' %}selected{% endif %}>Film</option>
                <option value="Dizi" {% if icerik and icerik.tur=='Dizi' %}selected{% endif %}>Dizi</option>
                <option value="Kitap" {% if icerik and icerik.tur=='Kitap' %}selected{% endif %}>Kitap</option>
            </select>
        </div>
        <div class="form-group">
            <label for="kategoriler">Kategoriler (virgülle ayırın)</label>
            <input type="text" id="kategoriler" name="kategoriler" value="{{ icerik.kategoriler if icerik else '' }}"
                placeholder="Aksiyon, Dram, Bilim Kurgu">
        </div>
        <div class="form-group">
            <label for="ozet">Özet</label>
            <textarea id="ozet" name="ozet" rows="4">{{ icerik.ozet if icerik else '' }}</textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="yil">Yıl</label>
                <input type="number" id="yil" name="yil" value="{{ icerik.yil if icerik else '' }}" placeholder="2024">
            </div>
            <div class="form-group">
                <label for="imdb_puani">IMDB Puanı (0-10)</label>
                <input type="number" id="imdb_puani" name="imdb_puani" step="0.1" min="0" max="10"
                    value="{{ icerik.imdb_puani if icerik else '0' }}">
            </div>
        </div>
        <div class="form-group">
            <label for="poster_url">Poster URL</label>
            <input type="text" id="poster_url" name="poster_url" value="{{ icerik.poster_url if icerik else '' }}"
                placeholder="https://...">
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">💾 Kaydet</button>
            <a href="/admin/icerikler" class="btn btn-secondary">❌ İptal</a>
        </div>
    </form>
</div>
{% endblock %}

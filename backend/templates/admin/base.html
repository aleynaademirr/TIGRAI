<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TIGRAI Admin{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }
        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: var(--sidebar-color);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 100;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .nav-item:hover,
        .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-color);
        }
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 40%);
        }
        /* Glassmorphism Utilities */
        .glass-effect {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
                0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* Common Elements */
        .card {
            @extend .glass-effect;
            /* Conceptually */
            background: var(--glass-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
        }
        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.film {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .badge.dizi {
            background: rgba(168, 85, 247, 0.2);
            color: #c084fc;
        }
        .badge.kitap {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }
        .badge.new {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: var(--accent-color);
            color: white;
        }
        /* Table Styling */
        .modern-table {
            width: 100%;
            border-collapse: collapse;
        }
        .modern-table th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--glass-border);
        }
        .modern-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            vertical-align: middle;
        }
        .modern-table tr:last-child td {
            border-bottom: none;
        }
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 1rem 0.5rem;
            }
            .nav-item span {
                display: none;
            }
            .main-content {
                margin-left: 70px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            🛡️ <span>TIGRAI</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/" class="nav-item {% if request.url.path == '/admin/' %}active{% endif %}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin/icerikler" class="nav-item {% if '/icerikler' in request.url.path %}active{% endif %}">
                <i class="fas fa-film"></i>
                <span>İçerikler</span>
            </a>
            <a href="/admin/kullanicilar"
                class="nav-item {% if '/kullanicilar' in request.url.path %}active{% endif %}">
                <i class="fas fa-users"></i>
                <span>Kullanıcılar</span>
            </a>
            <a href="/docs" class="nav-item" target="_blank">
                <span>🔌</span> <span>API Docs</span>
            </a>
        </nav>
        <div
            style="margin-top: auto; padding: 1rem; text-align: center; color: var(--text-secondary); font-size: 0.8rem;">
            v1.0.2 Pro
        </div>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
